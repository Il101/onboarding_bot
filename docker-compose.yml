services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vbrain
      POSTGRES_PASSWORD: vbrain
      POSTGRES_DB: vbrain
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  redis_data:
  postgres_data:
