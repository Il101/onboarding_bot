<div id="upload-status" class="mt-3">
    {% if success %}
    <div class="bg-green-50 text-green-700 px-4 py-3 rounded-lg text-sm">
        <i class="ti ti-check mr-1"></i> {{ message }}
        {% if job_id %}
        <div class="mt-1 text-xs text-green-600">Job ID: {{ job_id }}</div>
        {% endif %}
    </div>
    {% else %}
    <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg text-sm">
        <i class="ti ti-alert-circle mr-1"></i> {{ message }}
    </div>
    {% endif %}
</div>
