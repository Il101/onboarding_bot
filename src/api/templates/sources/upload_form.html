{% extends "base.html" %}
{% block title %}Загрузка - V-Brain Admin{% endblock %}
{% block content %}
<div>
    <div class="mb-6">
        <a href="/api/admin/sources" class="text-blue-600 hover:text-blue-800 text-sm">
            &larr; Назад к источникам
        </a>
    </div>
    <h2 class="display mb-6">Загрузка источников</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- PDF Upload -->
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="mb-4">PDF документ</h3>
            <form hx-post="/api/admin/sources/pdf"
                  hx-target="#pdf-status"
                  hx-swap="innerHTML"
                  enctype="multipart/form-data">
                <input type="file"
                       name="file"
                       accept=".pdf"
                       required
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button type="submit"
                        class="mt-4 w-full bg-blue-600 text-white rounded-lg px-4 py-2 hover:bg-blue-700 transition-colors">
                    Загрузить PDF
                </button>
            </form>
            <div id="pdf-status"></div>
        </div>

        <!-- Telegram Upload -->
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="mb-4">Telegram логи</h3>
            <form hx-post="/api/admin/sources/telegram"
                  hx-target="#telegram-status"
                  hx-swap="innerHTML"
                  enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">JSON файл</label>
                    <input type="file"
                           name="json_file"
                           accept=".json"
                           required
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">Голосовые файлы (.ogg) — опционально</label>
                    <input type="file"
                           name="voice_files"
                           accept=".ogg"
                           multiple
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <button type="submit"
                        class="w-full bg-blue-600 text-white rounded-lg px-4 py-2 hover:bg-blue-700 transition-colors">
                    Загрузить Telegram
                </button>
            </form>
            <div id="telegram-status"></div>
        </div>
    </div>
</div>
{% endblock %}
