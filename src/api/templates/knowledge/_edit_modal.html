<!-- Edit modal partial — included inline in review.html -->
<!-- Standalone reference for future reuse -->
<div id="edit-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
     @click.self="$el.classList.add('hidden')">
    <div class="bg-white rounded-lg shadow-xl p-6 w-[500px]">
        <h3 class="mb-4 font-semibold">Редактировать знание</h3>
        <form id="edit-form"
              @submit.prevent="
                  const id = document.getElementById('edit-item-id').value;
                  document.getElementById('edit-form').setAttribute('hx-put', '/api/admin/knowledge/' + id);
                  htmx.process(document.getElementById('edit-form'));
                  htmx.trigger(document.getElementById('edit-form'), 'submit');
              "
              hx-target="#edit-result"
              hx-swap="innerHTML">
            <input type="hidden" id="edit-item-id" name="item_id">
            <textarea id="edit-fact"
                      name="fact"
                      rows="5"
                      class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button"
                        @click="document.getElementById('edit-modal').classList.add('hidden')"
                        class="px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded">
                    Отмена
                </button>
                <button type="submit"
                        class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">
                    Сохранить
                </button>
            </div>
        </form>
        <div id="edit-result"></div>
    </div>
</div>
