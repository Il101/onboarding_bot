<div x-data="{ activeSection: 'sources' }" class="h-full flex flex-col">
    <div class="p-6 border-b">
        <h1 class="display">V-Brain Admin</h1>
    </div>
    <nav class="flex-1 p-4">
        <ul class="space-y-1">
            <li>
                <a href="/api/admin/sources"
                    :class="window.location.pathname.includes('sources') ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-100'"
                    class="flex items-center gap-3 p-3 rounded-lg transition-colors">
                    <i class="ti ti-file-upload w-5"></i>
                    <span>Sources</span>
                </a>
            </li>
            <li>
                <a href="/api/admin/knowledge"
                    :class="window.location.pathname.includes('knowledge') ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-100'"
                    class="flex items-center gap-3 p-3 rounded-lg transition-colors">
                    <i class="ti ti-book w-5"></i>
                    <span>Knowledge</span>
                </a>
            </li>
            <li>
                <a href="/api/admin/users"
                    :class="window.location.pathname.includes('users') ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-100'"
                    class="flex items-center gap-3 p-3 rounded-lg transition-colors">
                    <i class="ti ti-users w-5"></i>
                    <span>Users</span>
                </a>
            </li>
            <li>
                <a href="/api/admin/analytics"
                    :class="window.location.pathname.includes('analytics') ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-gray-100'"
                    class="flex items-center gap-3 p-3 rounded-lg transition-colors">
                    <i class="ti ti-chart-bar w-5"></i>
                    <span>Analytics</span>
                </a>
            </li>
        </ul>
    </nav>
    <div class="p-4 border-t">
        <form method="POST" action="/api/admin/logout" class="block">
            <button type="submit"
                    class="w-full flex items-center gap-3 p-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                <i class="ti ti-logout w-5"></i>
                <span>Sign out</span>
            </button>
        </form>
    </div>
</div>
